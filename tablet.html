<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skali Burg's — Tablet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --am:#F5C400;--am2:#FFD740;--az:#1A1A5E;
  --bg:#0a0a20;--bg2:#0f0f2e;--bg3:#161640;--card:#1a1a48;
  --border:rgba(245,196,0,0.18);--txt:#e8e8f0;--txt2:rgba(232,232,240,0.55);
  --green:#22c55e;--red:#ef4444;--orange:#f97316;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── TELA INICIAL (seleção de mesa) ── */
#sc-mesa{background:var(--bg);align-items:center;justify-content:flex-start;}
.mesa-top{background:var(--bg2);border-bottom:2px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;width:100%;flex-shrink:0;}
.mesa-brand{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--am);letter-spacing:3px;}
.mesa-sub{font-size:.65rem;color:var(--txt2);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.mesa-grid-wrap{flex:1;overflow-y:auto;padding:16px;}
.mesa-grid-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--txt2);letter-spacing:2px;margin-bottom:14px;}
.mesa-sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
.mesa-sel-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 8px;cursor:pointer;transition:all .15s;text-align:center;user-select:none;}
.mesa-sel-card:active{transform:scale(.96);}
.mesa-sel-card.livre{border-color:rgba(34,197,94,.3);}
.mesa-sel-card.ocupada{border-color:rgba(249,115,22,.4);}
.msn{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;}
.mesa-sel-card.livre .msn{color:var(--green);}
.mesa-sel-card.ocupada .msn{color:var(--orange);}
.msl{font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;}
.mesa-sel-card.livre .msl{color:rgba(34,197,94,.6);}
.mesa-sel-card.ocupada .msl{color:rgba(249,115,22,.7);}

/* ── TELA DE PEDIDO ── */
#sc-pedido{display:none;flex-direction:column;background:var(--bg);}
#sc-pedido.active{display:flex;}
.pedido-topbar{background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ped-back{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:7px 12px;color:var(--txt2);font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;cursor:pointer;}
.ped-back:active{background:rgba(245,196,0,.1);color:var(--am);}
.ped-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--am);letter-spacing:2px;flex:1;}
.cart-bubble{background:var(--am);color:var(--az);border-radius:20px;padding:5px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.cart-bubble:active{background:var(--am2);}
.pedido-body{display:flex;flex:1;overflow:hidden;}

/* Menu esquerdo */
.ped-menu{flex:1;overflow-y:auto;padding:10px;}
.ped-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none;}
.ped-cats::-webkit-scrollbar{display:none;}
.ped-cat-btn{flex-shrink:0;padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;background:transparent;color:var(--txt2);font-family:'Nunito',sans-serif;font-weight:800;font-size:.65rem;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
.ped-cat-btn.active{background:var(--am);color:var(--az);border-color:var(--am);}
.ped-sec{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--am);letter-spacing:2px;background:rgba(245,196,0,.07);border-left:3px solid var(--am);padding:5px 10px;border-radius:0 6px 6px 0;margin:8px 0;}
.ped-item{display:flex;align-items:center;gap:10px;padding:10px 6px;border-radius:10px;border:1px solid transparent;transition:all .15s;cursor:pointer;}
.ped-item:active{background:rgba(245,196,0,.08);border-color:rgba(245,196,0,.2);}
.pi-em{font-size:1.6rem;flex-shrink:0;width:36px;text-align:center;}
.pi-info{flex:1;}
.pi-name{font-weight:900;font-size:.82rem;color:var(--txt);}
.pi-desc{font-size:.62rem;color:var(--txt2);font-weight:700;margin-top:1px;}
.pi-price{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--am);flex-shrink:0;}
.pi-add{background:var(--am);border:none;border-radius:10px;width:32px;height:32px;color:var(--az);font-size:1.2rem;font-weight:900;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pi-add:active{background:var(--am2);transform:scale(.95);}

/* Carrinho direito (desktop) */
.ped-cart{width:250px;flex-shrink:0;background:var(--bg2);border-left:2px solid var(--border);display:flex;flex-direction:column;}
@media(max-width:640px){.ped-cart{display:none;}}
.cart-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--am);letter-spacing:2px;padding:12px 14px;border-bottom:1px solid var(--border);}
.cart-list{flex:1;overflow-y:auto;padding:6px 14px;}
.cart-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.cr-em{font-size:.95rem;flex-shrink:0;}
.cr-name{flex:1;font-size:.68rem;font-weight:800;line-height:1.3;}
.cr-price{font-family:'Bebas Neue',sans-serif;font-size:.8rem;color:var(--am);}
.cr-del{background:none;border:none;color:rgba(239,68,68,.45);cursor:pointer;font-size:.8rem;padding:2px;}
.cr-del:hover{color:var(--red);}
.cart-total-row{border-top:1px solid var(--border);padding:10px 14px;display:flex;justify-content:space-between;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--am);}
.cart-send-btn{margin:0 14px 14px;padding:12px;background:linear-gradient(135deg,var(--am),var(--am2));border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;color:var(--az);cursor:pointer;transition:all .2s;}
.cart-send-btn:disabled{opacity:.4;cursor:not-allowed;}
.cart-send-btn:not(:disabled):active{transform:scale(.98);}

/* Tela de carrinho mobile */
#sc-cart{background:var(--bg);}
.cart-mob-top{background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cart-mob-items{flex:1;overflow-y:auto;padding:10px 14px;}
.cart-mob-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.cmr-em{font-size:1.2rem;flex-shrink:0;}
.cmr-name{flex:1;font-size:.8rem;font-weight:800;}
.cmr-qty{display:flex;align-items:center;gap:6px;}
.cmr-qbtn{background:rgba(255,255,255,.1);border:none;border-radius:6px;width:26px;height:26px;color:var(--txt);font-weight:900;cursor:pointer;font-size:.85rem;}
.cmr-qbtn:active{background:rgba(245,196,0,.2);}
.cmr-qn{font-size:.8rem;font-weight:900;min-width:16px;text-align:center;}
.cmr-price{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--am);flex-shrink:0;}
.cart-mob-footer{padding:14px;border-top:2px solid var(--border);background:var(--bg2);}
.cart-mob-total{display:flex;justify-content:space-between;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--am);margin-bottom:12px;}
.cart-mob-send{width:100%;padding:14px;background:linear-gradient(135deg,var(--am),var(--am2));border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--az);cursor:pointer;}
.cart-mob-send:disabled{opacity:.4;}
.cart-mob-send:not(:disabled):active{transform:scale(.98);}

/* ── TELA DE LOGIN ── */
#sc-login{background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:0;padding:20px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--am);letter-spacing:4px;margin-bottom:4px;}
.login-sub{font-size:.72rem;color:var(--txt2);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px;}
.login-card{background:var(--bg2);border:2px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;}
.login-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--am);letter-spacing:2px;margin-bottom:14px;text-align:center;}
.login-input{width:100%;padding:14px 16px;background:var(--bg);border:2px solid var(--border);border-radius:14px;color:var(--txt);font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;outline:none;text-align:center;letter-spacing:1px;transition:border-color .2s;margin-bottom:16px;}
.login-input:focus{border-color:var(--am);}
.login-input::placeholder{color:var(--txt2);opacity:.5;font-weight:700;letter-spacing:0;}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--am),var(--am2));border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--az);cursor:pointer;transition:all .2s;}
.login-btn:active{transform:scale(.98);}
.login-hint{font-size:.65rem;color:var(--txt2);text-align:center;margin-top:12px;font-weight:700;}
/* Badge do atendente no topo */
.atendente-badge{background:rgba(245,196,0,.1);border:1px solid rgba(245,196,0,.25);border-radius:10px;padding:4px 12px;font-size:.68rem;font-weight:900;color:var(--am);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.atendente-badge:active{background:rgba(245,196,0,.2);}

/* Toast / confirmação */
.tablet-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--am);color:var(--az);padding:12px 24px;border-radius:14px;font-weight:900;font-size:.85rem;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.tablet-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Confirmação de envio */
#sc-confirm{background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:18px;padding:30px;}
.confirm-icon{font-size:4rem;}
.confirm-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--am);letter-spacing:3px;text-align:center;}
.confirm-sub{font-size:.85rem;color:var(--txt2);font-weight:700;text-align:center;}
.confirm-btn{padding:13px 32px;background:linear-gradient(135deg,var(--am),var(--am2));border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;color:var(--az);cursor:pointer;}
</style>

<div class="screen" id="sc-login">

    <button class="login-btn" onclick="loginEntrar()">✅ Entrar e Atender</button>
    <div class="login-hint">Seu nome aparecerá no pedido para controle de vendas</div>
  </div>
</div>

<!-- ── TELA 1: Selecionar Mesa ── -->
<div class="screen" id="sc-mesa">

  </div>
</div>

<!-- ── TELA 2: Menu + Carrinho ── -->
<div class="screen" id="sc-pedido">
  <div class="pedido-topbar">
    <button class="ped-back" onclick="irParaMesas()">◀ Mesas</button>
    <div class="ped-title" id="ped-title">🪑 MESA 01</div>
    <span id="ped-atendente-lbl" style="font-size:.62rem;color:var(--txt2);font-weight:900;flex-shrink:0;"></span>
    <button class="cart-bubble" onclick="irParaCarrinho()" id="cart-bubble">🛒 0 itens</button>
  </div>
  <div class="pedido-body">
    <div class="ped-menu" id="ped-menu">

      <div id="ped-items"></div>
    </div>
    <div class="ped-cart">
      <div class="cart-title">🛒 CARRINHO</div>
      <div class="cart-list" id="cart-list-desk"></div>
      <div class="cart-total-row"><span>TOTAL</span><span id="cart-total-desk">R$ 0,00</span></div>
      <button class="cart-send-btn" id="cart-send-desk" onclick="enviarPedido()" disabled>✅ Enviar para Cozinha</button>
    </div>
  </div>
</div>

<!-- ── TELA 3: Carrinho Mobile ── -->
<div class="screen" id="sc-cart">
  <div class="cart-mob-top">
    <button class="ped-back" onclick="irParaMenu()">◀ Menu</button>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--am);letter-spacing:2px;flex:1;">🛒 CARRINHO</span>
    <span id="mesa-lbl-cart" style="font-size:.72rem;font-weight:800;color:var(--txt2);"></span>
  </div>
  <div class="cart-mob-items" id="cart-mob-items"></div>
  <div class="cart-mob-footer">
    <div class="cart-mob-total"><span>TOTAL</span><span id="cart-total-mob">R$ 0,00</span></div>
    <button class="cart-mob-send" id="cart-send-mob" onclick="enviarPedido()" disabled>✅ Enviar para Cozinha</button>
  </div>
</div>

<!-- ── TELA 4: Confirmação ── -->
<div class="screen" id="sc-confirm">
  <div class="confirm-icon">✅</div>
  <div class="confirm-title">PEDIDO ENVIADO!</div>
  <div class="confirm-sub" id="confirm-sub">Mesa 01 · 0 itens · R$ 0,00</div>
  <button class="confirm-btn" onclick="irParaMesas()">Nova Mesa</button>
</div>

/* ── ESTADO ── */
var mesaAtualTab = null;
var carrinho = []; // [{emoji, nome, preco, qty}]
var catFiltro = 'all';
var mesasStatusTab = {};
var nomeAtendente = '';

/* ── INIT ── */
window.addEventListener('load', async function() {
  // Verificar se já tem nome salvo
  var nomeSalvo = localStorage.getItem('skali_atendente') || '';
  if (nomeSalvo) {
    nomeAtendente = nomeSalvo;
    atualizarBadgeAtendente();
    await carregarMesasStatus();
    renderMesaGrid();
    irParaScreen('sc-mesa');
  } else {
    irParaScreen('sc-login');
    setTimeout(function(){ var inp = document.getElementById('login-nome-input'); if(inp) inp.focus(); }, 200);
  }
});

/* ── LOGIN DO ATENDENTE ── */
function loginEntrar() {
  var input = document.getElementById('login-nome-input');
  var nome = input ? input.value.trim() : '';
  if (!nome || nome.length < 2) {
    input.style.borderColor = 'var(--red)';
    setTimeout(function(){ input.style.borderColor = ''; }, 1200);
    tbToast('⚠️ Digite seu nome (mín. 2 caracteres)');
    return;
  }
  nomeAtendente = nome;
  localStorage.setItem('skali_atendente', nome);
  atualizarBadgeAtendente();
  carregarMesasStatus().then(function(){
    renderMesaGrid();
    irParaScreen('sc-mesa');
  });
}

function trocarAtendente() {
  // Limpa nome e volta para login
  localStorage.removeItem('skali_atendente');
  nomeAtendente = '';
  var input = document.getElementById('login-nome-input');
  if (input) input.value = '';
  irParaScreen('sc-login');
  setTimeout(function(){ if(input) input.focus(); }, 200);
}

function atualizarBadgeAtendente() {
  var badge = document.getElementById('atendente-badge-lbl');
  if (badge) badge.textContent = '👤 ' + nomeAtendente;
  var pedLbl = document.getElementById('ped-atendente-lbl');
  if (pedLbl) pedLbl.textContent = '👤 ' + nomeAtendente;
}

async function carregarMesasStatus() {
  try {
    var { data } = await SUPA.from('mesas_skali').select('numero,status').order('numero');
    if (data) data.forEach(function(m){ mesasStatusTab[m.numero] = m.status || 'livre'; });
  } catch(e) { console.warn('Mesas status:', e); }
}

function renderMesaGrid() {
  var grid = document.getElementById('mesa-sel-grid');
  grid.innerHTML = '';
  for (var i = 1; i <= 15; i++) {
    (function(num){
      var status = mesasStatusTab[num] || 'livre';
      var card = document.createElement('div');
      card.className = 'mesa-sel-card ' + status;
      card.onclick = function(){ selecionarMesa(num); };
      var icon = status === 'livre' ? '🟢' : '🟡';
      var label = status === 'livre' ? 'Livre' : 'Ocupada';
      card.innerHTML = '<div class="msn">'+String(num).padStart(2,'0')+'</div><div class="msl">'+icon+' '+label+'</div>';
      grid.appendChild(card);
    })(i);
  }
}

function selecionarMesa(num) {
  mesaAtualTab = num;
  carrinho = [];
  catFiltro = 'all';
  document.getElementById('ped-title').textContent = '🪑 MESA ' + String(num).padStart(2,'0');
  document.getElementById('mesa-lbl-cart').textContent = 'Mesa ' + String(num).padStart(2,'0');
  atualizarBadgeAtendente();
  renderCats();
  renderItems();
  renderCartDesk();
  irParaScreen('sc-pedido');
}

function irParaMesas() {
  mesaAtualTab = null;
  carrinho = [];
  carregarMesasStatus().then(renderMesaGrid);
  irParaScreen('sc-mesa');
}

function irParaMenu()     { irParaScreen('sc-pedido'); }
function irParaCarrinho() { renderCartMob(); irParaScreen('sc-cart'); }

function irParaScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

/* ── MENU ── */
function renderCats() {
  var el = document.getElementById('ped-cats');
  el.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'ped-cat-btn active';
  allBtn.textContent = 'Todos';
  allBtn.onclick = function(){ filterCat('all',allBtn); };
  el.appendChild(allBtn);
  MENU.forEach(function(cat){
    var btn = document.createElement('button');
    btn.className = 'ped-cat-btn';
    btn.textContent = cat.icon + ' ' + cat.title;
    btn.onclick = (function(id,b){ return function(){ filterCat(id,b); }; })(cat.id,btn);
    el.appendChild(btn);
  });
}

function filterCat(id, btn) {
  catFiltro = id;
  document.querySelectorAll('.ped-cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderItems();
}

function escS(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderItems() {
  var panel = document.getElementById('ped-items');
  panel.innerHTML = '';
  var lista = catFiltro === 'all' ? MENU : MENU.filter(function(c){ return c.id === catFiltro; });
  lista.forEach(function(cat){
    var st = document.createElement('div'); st.className='ped-sec'; st.textContent=cat.icon+' '+cat.title; panel.appendChild(st);
    cat.subs.forEach(function(sub){
      if (sub.title) {
        var sd = document.createElement('div');
        sd.style.cssText='font-size:.62rem;font-weight:900;color:var(--txt2);margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px;';
        sd.textContent=sub.title; panel.appendChild(sd);
      }
      sub.items.forEach(function(item){
        var row = document.createElement('div'); row.className='ped-item';
        var em = item.e||'🍽️';
        row.innerHTML='<div class="pi-em">'+em+'</div>'
          +'<div class="pi-info"><div class="pi-name">'+item.n+'</div>'+(item.d?'<div class="pi-desc">'+item.d+'</div>':'')+'</div>'
          +'<div class="pi-price">R$ '+item.p.toFixed(2).replace('.',',')+'</div>'
          +'<button class="pi-add" onclick="addItem(\''+escS(em)+'\',\''+escS(item.n)+'\','+item.p+')">+</button>';
        panel.appendChild(row);
      });
    });
  });
}

function addItem(emoji, nome, preco) {
  var idx = carrinho.findIndex(function(i){ return i.nome===nome; });
  if (idx !== -1) {
    carrinho[idx].qty++;
  } else {
    carrinho.push({ emoji:emoji, nome:nome, preco:parseFloat(preco), qty:1 });
  }
  updateCartBubble();
  renderCartDesk();
  tbToast('➕ ' + nome);
}

function removeItem(idx) {
  if (carrinho[idx].qty > 1) {
    carrinho[idx].qty--;
  } else {
    carrinho.splice(idx,1);
  }
  updateCartBubble();
  renderCartDesk();
  renderCartMob();
}

function updateCartBubble() {
  var total = carrinho.reduce(function(s,i){ return s+i.qty; }, 0);
  var val   = carrinho.reduce(function(s,i){ return s+i.preco*i.qty; }, 0);
  document.getElementById('cart-bubble').textContent = '🛒 '+total+' item'+(total!==1?'s':'')+' · R$ '+val.toFixed(2).replace('.',',');
}

function renderCartDesk() {
  var list  = document.getElementById('cart-list-desk');
  var total = document.getElementById('cart-total-desk');
  var btn   = document.getElementById('cart-send-desk');
  list.innerHTML = '';
  var tot = 0;
  carrinho.forEach(function(item,idx){
    tot += item.preco * item.qty;
    var row = document.createElement('div'); row.className='cart-row';
    row.innerHTML='<span class="cr-em">'+item.emoji+'</span>'
      +'<span class="cr-name">'+(item.qty>1?item.qty+'x ':'')+item.nome+'</span>'
      +'<span class="cr-price">R$ '+(item.preco*item.qty).toFixed(2).replace('.',',')+'</span>'
      +'<button class="cr-del" onclick="removeItem('+idx+')">✕</button>';
    list.appendChild(row);
  });
  total.textContent = 'R$ ' + tot.toFixed(2).replace('.',',');
  btn.disabled = carrinho.length === 0;
}

function renderCartMob() {
  var el  = document.getElementById('cart-mob-items');
  var tot = document.getElementById('cart-total-mob');
  var btn = document.getElementById('cart-send-mob');
  el.innerHTML = '';
  var total = 0;
  carrinho.forEach(function(item,idx){
    total += item.preco * item.qty;
    var row = document.createElement('div'); row.className='cart-mob-row';
    row.innerHTML='<span class="cmr-em">'+item.emoji+'</span>'
      +'<span class="cmr-name">'+item.nome+'</span>'
      +'<div class="cmr-qty">'
      +'<button class="cmr-qbtn" onclick="removeItem('+idx+')">−</button>'
      +'<span class="cmr-qn">'+item.qty+'</span>'
      +'<button class="cmr-qbtn" onclick="addItem(\''+escS(item.emoji)+'\',\''+escS(item.nome)+'\','+item.preco+')">+</button>'
      +'</div>'
      +'<span class="cmr-price">R$ '+(item.preco*item.qty).toFixed(2).replace('.',',')+'</span>';
    el.appendChild(row);
  });
  if (carrinho.length === 0) el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt2);">Carrinho vazio</div>';
  tot.textContent = 'R$ ' + total.toFixed(2).replace('.',',');
  btn.disabled = carrinho.length === 0;
}

async function enviarPedido() {
  if (carrinho.length === 0 || !mesaAtualTab) return;
  var num  = mesaAtualTab;
  var sendBtnDesk = document.getElementById('cart-send-desk');
  var sendBtnMob  = document.getElementById('cart-send-mob');
  sendBtnDesk.disabled = sendBtnMob.disabled = true;
  sendBtnDesk.textContent = sendBtnMob.textContent = '⏳ Enviando...';

  try {
    var now  = new Date();
    var hora = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    var itensArr = [];
    var total = 0;
    carrinho.forEach(function(i){
      for (var q=0; q<i.qty; q++) {
        itensArr.push({ emoji:i.emoji, name:i.nome, price:i.preco, qty:1, category:'mesa' });
        total += i.preco;
      }
    });

    // Cria pedido para a cozinha
    var { data: pedRow, error: pedErr } = await SUPA.from('pedidos_skali').insert([{
      cliente: 'Mesa '+String(num).padStart(2,'0'),
      telefone: '',
      endereco: 'Atendimento presencial',
      entrega:  'Mesa '+String(num).padStart(2,'0'),
      pagamento:'mesa', troco:'', itens:itensArr,
      total:total, taxa:0, status:'recebido', hora:hora, nota:'Tablet — Mesa '+num
    }]).select().single();
    if (pedErr) throw pedErr;

    var pedidoId = pedRow ? String(pedRow.id) : '';

    // Registra itens na comanda da mesa (com nome do atendente)
    var insItens = itensArr.map(function(i){
      return { mesa_numero:num, item_nome:i.name, item_preco:i.price, emoji:i.emoji,
               status_pagamento:'pendente', pedido_id:pedidoId, atendente_nome:nomeAtendente };
    });
    var { error: itErr } = await SUPA.from('itens_comanda_skali').insert(insItens);
    if (itErr) {
      // Se coluna não existe ainda, tenta sem o campo (retrocompatível)
      if (itErr.message && itErr.message.indexOf('atendente_nome') !== -1) {
        var insItens2 = itensArr.map(function(i){
          return { mesa_numero:num, item_nome:i.name, item_preco:i.price, emoji:i.emoji,
                   status_pagamento:'pendente', pedido_id:pedidoId };
        });
        var { error: itErr2 } = await SUPA.from('itens_comanda_skali').insert(insItens2);
        if (itErr2) throw itErr2;
      } else { throw itErr; }
    }

    // Marca mesa como ocupada
    var statusAtual = mesasStatusTab[num] || 'livre';
    if (statusAtual === 'livre') {
      await SUPA.from('mesas_skali').update({ status:'ocupada', aberta_em:now.toISOString() }).eq('numero', num);
      mesasStatusTab[num] = 'ocupada';
    }

    // Tela de confirmação
    var qtdTotal = carrinho.reduce(function(s,i){ return s+i.qty; }, 0);
    document.getElementById('confirm-sub').textContent = 'Mesa '+String(num).padStart(2,'0')+' · '+qtdTotal+' item(s) · R$ '+total.toFixed(2).replace('.',',')+' · 👤 '+nomeAtendente;
    irParaScreen('sc-confirm');
    carrinho = [];
    updateCartBubble();

  } catch(e) {
    console.error(e);
    tbToast('❌ Erro: ' + (e && e.message ? e.message : 'Tente novamente'));
    sendBtnDesk.disabled = sendBtnMob.disabled = false;
    sendBtnDesk.textContent = '✅ Enviar para Cozinha';
    sendBtnMob.textContent  = '✅ Enviar para Cozinha';
  }
}

function tbToast(msg) {
  var el = document.getElementById('tb-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}
</script>
